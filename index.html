        {"@type":"Question","name":"What is included in the Starter plan?","acceptedAnswer":{"@type":"Answer","text":"The Starter plan gives SMEs free access to basic trade documentation tools, market discovery features, community support, single-currency transactions, and up to 5 shipments per month—ideal for businesses exploring cross-border trade for the first time."}},
        {"@type":"Question","name":"How does the Enterprise plan work as an export department?","acceptedAnswer":{"@type":"Answer","text":"Our Enterprise tier acts as your fully managed digital export department. A dedicated trade operations team handles documentation, compliance, logistics coordination, and payment settlement on your behalf—so you can scale internationally without building an in-house export team."}},
        {"@type":"Question","name":"What onboarding support do you provide?","acceptedAnswer":{"@type":"Answer","text":"All plans include guided onboarding. Growth users receive priority setup assistance, while Enterprise clients get white-glove onboarding with custom compliance workflow configuration, ERP integration support, and dedicated training sessions for their team."}},
        {"@type":"Question","name":"How does DTFS handle regulatory compliance?","acceptedAnswer":{"@type":"Answer","text":"DTFS uses AI-assisted compliance checks to ensure your shipments meet destination-specific regulatory requirements. Enterprise clients benefit from custom compliance workflows and a dedicated team that monitors evolving trade regulations across target markets."}},
        {"@type":"Question","name":"Can I upgrade or downgrade my plan at any time?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can upgrade from Starter to Growth instantly, and changes take effect immediately. Enterprise transitions involve a brief consultation to configure your dedicated operations team and integrations. Downgrades are processed at the end of your billing cycle."}},
        {"@type":"Question","name":"What currencies and payment methods are supported?","acceptedAnswer":{"@type":"Answer","text":"Starter supports single-currency transactions. Growth and Enterprise plans unlock multi-currency payments with integrated FX tools, enabling you to transact across African, Asian, and global markets with competitive exchange rates and priority settlement processing."}}
